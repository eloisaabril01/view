<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session #{{ session_id }} — ViewMain</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#16161f;--border:#2a2a3d;--accent:#7c3aed;--accent2:#a855f7;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b}
html,body{min-height:100vh;background:#000;color:var(--text);font-family:'Space Grotesk',sans-serif}

/* top bar */
.topbar{background:rgba(10,10,15,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:200}
.tb-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.session-id{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--text3)}
.live-indicator{display:flex;align-items:center;gap:6px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);border-radius:100px;padding:4px 12px;font-size:.8rem;font-weight:600;color:#fca5a5;font-family:'JetBrains Mono',monospace}
.live-dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.viewer-count{font-size:1.1rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.proxy-stat{font-size:.75rem;color:var(--text3);font-family:'JetBrains Mono',monospace}
.tb-right{display:flex;align-items:center;gap:8px}
.btn-sm{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:.8rem;font-weight:500;text-decoration:none;transition:all .15s;cursor:pointer;border:1px solid}
.btn-back{background:rgba(100,116,139,.1);border-color:var(--border);color:var(--text2)}.btn-back:hover{background:rgba(100,116,139,.2)}
.btn-stop{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#fca5a5}.btn-stop:hover{background:rgba(239,68,68,.2)}

/* grid */
.video-grid{display:grid;gap:4px;padding:4px;background:#000}
.video-cell{position:relative;background:#111;overflow:hidden;border:1px solid #1a1a2e}
.video-cell iframe{width:100%;height:100%;border:none;display:block}
.cell-overlay{position:absolute;top:3px;left:3px;right:3px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10}
.frame-num{background:rgba(0,0,0,.7);backdrop-filter:blur(4px);border-radius:4px;padding:2px 6px;font-size:.65rem;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.5)}
.proxy-tag{background:rgba(16,185,129,.8);backdrop-filter:blur(4px);border-radius:4px;padding:2px 6px;font-size:.62rem;font-family:'JetBrains Mono',monospace;color:#fff;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proxy-tag.direct{background:rgba(100,116,139,.7)}
.proxy-tag.loading{background:rgba(59,130,246,.7)}
.timer-tag{position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.6);border-radius:4px;padding:2px 5px;font-size:.6rem;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.4);pointer-events:none;z-index:10}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-left">
    <div>
      <div class="session-id">SESSION #{{ session_id }} · {{ video_count }} FRAMES</div>
      <div style="font-size:.75rem;color:var(--green);margin-top:1px">✅ Background mode · 24/7 active</div>
    </div>
    <div class="live-indicator"><span class="live-dot"></span> LIVE <span class="viewer-count" id="live-viewers">…</span></div>
    <div class="proxy-stat" id="proxy-stat">Loading proxy info…</div>
  </div>
  <div class="tb-right">
    <a href="{{ url_for('dashboard') }}" class="btn-sm btn-back">← Dashboard</a>
    <a href="{{ url_for('stop_session', session_id=session_id) }}" class="btn-sm btn-stop">■ Stop Session</a>
  </div>
</div>

<div class="video-grid" id="video-grid" style="
  grid-template-columns: repeat({{ [[(video_count**0.5)|round(0,'ceil')|int, 1]|max, 10]|min }}, 1fr);
">
{% for i in range(video_count) %}
<div class="video-cell" id="cell-{{ i }}" style="aspect-ratio:16/9">
  <div class="cell-overlay">
    <span class="frame-num">F{{ i }}</span>
    <span class="proxy-tag loading" id="ptag-{{ i }}">…</span>
  </div>
  <span class="timer-tag" id="timer-{{ i }}">0:00</span>
  <iframe id="frame-{{ i }}" src="about:blank"
    allowfullscreen
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    allow="autoplay; encrypted-media; fullscreen; picture-in-picture">
  </iframe>
</div>
{% endfor %}
</div>

<script>
const SESSION_ID = {{ session_id }};
const VIDEO_ID = '{{ video_id }}';
const FRAME_COUNT = {{ video_count }};
const ORIGIN = window.location.origin;

const frameData = {};

// ── Grid column calculation ──────────────────────────────────────────────
(function() {
  const cols = Math.min(Math.ceil(Math.sqrt(FRAME_COUNT)), 10);
  document.getElementById('video-grid').style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
})();

// ── Build embed URL (fallback direct, no proxy dependency) ───────────────
function buildEmbedUrl(frameIndex, startOffset) {
  const proxyBase = `/proxy_youtube/${SESSION_ID}/${frameIndex}/${VIDEO_ID}`;
  const p = new URLSearchParams({
    autoplay:'1', mute:'1', controls:'1', rel:'0', showinfo:'0',
    modestbranding:'1', enablejsapi:'1', loop:'1',
    playlist: VIDEO_ID,
    origin: ORIGIN,
    t: Date.now() + frameIndex,
    start: startOffset || Math.floor(Math.random() * 8),
    vq: 'small',
    hl: ['en','es','fr','de','it','pt','ja','ko'][frameIndex % 8],
    gl: ['US','CA','GB','DE','FR','AU','JP','BR'][frameIndex % 8]
  });
  return `${proxyBase}?${p.toString()}`;
}

// ── Init frame with staggered start ──────────────────────────────────────
async function initFrame(i) {
  const ptag = document.getElementById(`ptag-${i}`);

  // Fetch proxy info for display
  try {
    const r = await fetch(`/api/proxy_request/${SESSION_ID}/${i}`);
    const d = await r.json();
    if (d.abbreviated_string) {
      ptag.textContent = d.abbreviated_string;
      ptag.className = 'proxy-tag' + (d.is_fast ? '' : ' direct');
    } else {
      ptag.textContent = 'DIRECT';
      ptag.className = 'proxy-tag direct';
    }
    frameData[i] = d;
  } catch(e) {
    ptag.textContent = 'DIRECT';
    ptag.className = 'proxy-tag direct';
  }

  // Load iframe
  const iframe = document.getElementById(`frame-${i}`);
  iframe.src = buildEmbedUrl(i, i * 3); // staggered start times

  // Start timer
  startTimer(i);

  // Schedule view cycle restart
  scheduleRestart(i);
}

// ── Timer ────────────────────────────────────────────────────────────────
function startTimer(i) {
  if (frameData[i] && frameData[i]._timerInt) clearInterval(frameData[i]._timerInt);
  let secs = 0;
  const el = document.getElementById(`timer-${i}`);
  const interval = setInterval(() => {
    secs++;
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    if (el) el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);
  if (!frameData[i]) frameData[i] = {};
  frameData[i]._timerInt = interval;
  frameData[i]._startAt = Date.now();
}

// ── Restart cycle to generate fresh views ────────────────────────────────
function scheduleRestart(i) {
  // Restart each iframe every 5–8 minutes with fresh params
  const delay = (300 + Math.random() * 180) * 1000;
  setTimeout(() => {
    const iframe = document.getElementById(`frame-${i}`);
    if (iframe && document.body.contains(iframe)) {
      iframe.src = buildEmbedUrl(i, Math.floor(Math.random() * 10));
      startTimer(i);
      scheduleRestart(i);
    }
  }, delay);
}

// ── Engagement simulation ────────────────────────────────────────────────
function simulateEngagement(i) {
  const iframe = document.getElementById(`frame-${i}`);
  if (!iframe) return;
  // Post play command
  try {
    iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
  } catch(e) {}
}

// ── Staggered init ───────────────────────────────────────────────────────
for (let i = 0; i < FRAME_COUNT; i++) {
  setTimeout(() => initFrame(i), i * 400 + Math.random() * 600);
}

// Engagement heartbeat
setInterval(() => {
  for (let i = 0; i < FRAME_COUNT; i++) simulateEngagement(i);
}, 25000);

// ── Live viewers ─────────────────────────────────────────────────────────
function updateViewers() {
  fetch(`/api/live_viewers/${SESSION_ID}`)
    .then(r => r.json())
    .then(d => {
      const el = document.getElementById('live-viewers');
      if (el && d.live_viewers) el.textContent = d.live_viewers.toLocaleString();
    }).catch(() => {});
}

// ── Proxy stats in topbar ────────────────────────────────────────────────
function updateProxyStat() {
  fetch(`/api/session_status/${SESSION_ID}`)
    .then(r => r.json())
    .then(d => {
      const el = document.getElementById('proxy-stat');
      if (!el) return;
      if (d.proxy_info) {
        const pi = d.proxy_info;
        el.textContent = `🔗 ${pi.abbreviated_string} · ${pi.response_time?.toFixed(2)||'?'}s · ${pi.success_rate?.toFixed(0)||'?'}% ok`;
      }
      if (d.multi_proxy_info) {
        el.textContent = `🌐 ${d.multi_proxy_info.proxy_count} proxies · ${FRAME_COUNT} frames`;
      }
    }).catch(() => {});
}

updateViewers();
updateProxyStat();
setInterval(updateViewers, 4000);
setInterval(updateProxyStat, 30000);

// Keep session alive heartbeat to server
setInterval(() => {
  fetch(`/api/session_heartbeat/${SESSION_ID}`, {method:'POST'}).catch(() => {});
}, 120000);
</script>
</body>
</html>
